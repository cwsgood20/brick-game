<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0f1226">
<title>벽돌깨기 (Brick Breaker)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    background: #0f1226;
    color: #e8e8ff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    overflow: hidden;
    touch-action: none;
    user-select: none;
  }
  #wrap {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: env(safe-area-inset-top) 8px env(safe-area-inset-bottom);
  }
  #hud {
    width: 100%;
    max-width: 480px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: .5px;
    padding: 0 6px;
  }
  #hud .label { opacity: .6; font-weight: 400; font-size: 12px; }
  #hud b { color: #6df2c4; }
  #stage {
    position: relative;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 12px 40px rgba(0,0,0,.5);
    background: linear-gradient(180deg, #1a1f3d, #11132a);
  }
  canvas { display: block; width: 100%; height: 100%; }
  #overlay {
    position: absolute;
    inset: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    background: rgba(8, 10, 26, .85);
    text-align: center;
    padding: 22px;
  }
  #overlay.hidden { display: none; }
  #overlay h1 { font-size: 26px; font-weight: 800; letter-spacing: 1px; }
  #overlay p { font-size: 13.5px; opacity: .8; line-height: 1.6; max-width: 300px; }
  #overlay .big { font-size: 22px; color: #6df2c4; font-weight: 700; }

  .controls { display: flex; flex-direction: column; gap: 12px; align-items: center; }
  .ctrl-label { font-size: 12px; opacity: .6; margin-bottom: 2px; }

  /* 난이도 칩 */
  .chips { display: flex; gap: 8px; }
  .chip {
    font: inherit; font-size: 13px; font-weight: 600;
    color: #cfd2ff; background: rgba(255,255,255,.08);
    border: 1.5px solid transparent; border-radius: 999px;
    padding: 8px 16px; cursor: pointer;
  }
  .chip.active { color: #0f1226; background: #56c8ff; border-color: #6df2c4; }

  /* 레벨 스테퍼 */
  .stepper { display: flex; align-items: center; gap: 14px; }
  .step-btn {
    width: 40px; height: 40px; border-radius: 50%;
    font-size: 22px; font-weight: 700; line-height: 1;
    color: #0f1226; background: #e8e8ff; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .step-btn:active { transform: scale(.92); }
  .step-val { font-size: 26px; font-weight: 800; min-width: 42px; color: #6df2c4; }

  button.primary {
    font: inherit; font-weight: 700; font-size: 17px;
    color: #0f1226;
    background: linear-gradient(135deg, #6df2c4, #56c8ff);
    border: none; border-radius: 999px; padding: 13px 44px; cursor: pointer;
    box-shadow: 0 6px 18px rgba(86,200,255,.35);
    transition: transform .1s;
  }
  button.primary:active { transform: scale(.95); }
  .hint { font-size: 12px; opacity: .55; text-align: center; }

  /* 고양이 응원 토스트 */
  /* 가운데 크게 등장해 살짝 방해하는 고양이 */
  #cheer {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%) scale(.3);
    width: 62%; max-width: 290px;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    opacity: 0;
    transition: transform .4s cubic-bezier(.2,1.6,.4,1), opacity .3s;
    pointer-events: none; /* 터치/클릭을 막지 않아 게임은 계속 진행 */
    z-index: 5;
  }
  #cheer.show { transform: translate(-50%, -50%) scale(1); opacity: .96; }
  #cheer .catname {
    background: #1a1f3d; color: #6df2c4;
    font-size: 13px; font-weight: 800; letter-spacing: .5px;
    padding: 4px 14px; border-radius: 999px;
    box-shadow: 0 4px 12px rgba(0,0,0,.35);
  }
  #cheer .face {
    width: 100%; border-radius: 26px; overflow: hidden;
    background: #d9f5ea;
    box-shadow: 0 14px 44px rgba(0,0,0,.5);
  }
  #cheer .face svg { width: 100%; height: auto; display: block; }
  #cheer .msg {
    position: relative;
    background: #fff; color: #1a1f3d;
    font-size: 15.5px; font-weight: 700; line-height: 1.35;
    padding: 11px 18px; border-radius: 16px; text-align: center;
    box-shadow: 0 6px 18px rgba(0,0,0,.35);
  }
  #cheer .msg::before {
    content: ''; position: absolute; top: -7px; left: 50%; transform: translateX(-50%);
    border-left: 8px solid transparent; border-right: 8px solid transparent;
    border-bottom: 8px solid #fff;
  }
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <span><span class="label">점수</span> <b id="score">0</b></span>
    <span><span class="label">레벨</span> <b id="level">1</b></span>
    <span><span class="label">생명</span> <b id="lives">♥♥♥</b></span>
  </div>
  <div id="stage">
    <canvas id="game"></canvas>
    <div id="cheer">
      <div class="catname">🐾 베네스</div>
      <div class="face" id="cheerFace">😺</div>
      <div class="msg" id="cheerMsg"></div>
    </div>
    <div id="overlay">
      <h1 id="ov-title">🧱 베네스 벽돌깨기</h1>
      <p id="ov-sub">패들을 좌우로 움직여 모든 벽돌을 깨세요.</p>

      <div class="controls" id="ov-controls">
        <div>
          <div class="ctrl-label">난이도</div>
          <div class="chips" id="diffChips">
            <button class="chip" data-diff="easy">쉬움</button>
            <button class="chip" data-diff="normal">보통</button>
            <button class="chip active" data-diff="hard">어려움</button>
          </div>
        </div>
        <div>
          <div class="ctrl-label">시작 레벨</div>
          <div class="stepper">
            <button class="step-btn" id="lvDown">−</button>
            <span class="step-val" id="lvVal">5</span>
            <button class="step-btn" id="lvUp">＋</button>
          </div>
        </div>
        <div>
          <div class="ctrl-label">고양이 음성</div>
          <div class="chips" id="soundChips">
            <button class="chip active" data-sound="on">🔊 켜기</button>
            <button class="chip" data-sound="off">🔇 끄기</button>
          </div>
        </div>
      </div>

      <button class="primary" id="startBtn">시작하기</button>
      <p class="hint" id="ov-hint">모바일: 화면 드래그 · PC: 마우스/← → 키</p>
    </div>
  </div>
  <p class="hint">화면을 좌우로 움직여 패들을 조작하세요</p>
</div>

<script>
(function () {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const stage = document.getElementById('stage');
  const overlay = document.getElementById('overlay');
  const startBtn = document.getElementById('startBtn');
  const scoreEl = document.getElementById('score');
  const levelEl = document.getElementById('level');
  const livesEl = document.getElementById('lives');

  // 논리 해상도 (3:4). 게임 좌표는 항상 이 기준.
  const W = 360, H = 480;

  // ---- 레이아웃: 캔버스 크기를 JS로 직접 계산 (aspect-ratio 미사용) ----
  function layout() {
    const availW = Math.min(480, window.innerWidth - 16);
    const availH = window.innerHeight - 110; // HUD + 하단 힌트 여유
    let w = availW, h = w * 4 / 3;
    if (h > availH) { h = availH; w = h * 3 / 4; }
    w = Math.max(200, Math.floor(w));
    h = Math.max(266, Math.floor(h));
    stage.style.width = w + 'px';
    stage.style.height = h + 'px';

    const dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 3));
    canvas.width = Math.round(W * dpr);
    canvas.height = Math.round(H * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', layout);
  window.addEventListener('orientationchange', layout);
  layout();

  const COLORS = ['#ff6b6b', '#ffa94d', '#ffd43b', '#69db7c', '#4dabf7', '#b197fc'];
  const DIFF = { easy: 2.6, normal: 3.4, hard: 4.4 };

  // ----- 고양이 응원 (외부 파일 없이 SVG로 직접 그린 단순화 고양이) -----
  // 첨부 사진의 스코티시폴드(접힌 귀·태비 줄무늬·흰 가슴)를 단순화한 일러스트
  // 첨부 사진 3장의 느낌을 각각 살린 고양이 머리 + 장면
  // 실제 사진 느낌: 둥글고 넓은 얼굴, 작고 납작하게 접힌 귀, 도톰한 볼살, 이마 태비 무늬
  function headMarkup(mood) {
    const happy = mood === 'happy';
    const eyeL = happy
      ? '<circle cx="38" cy="57" r="9.5" fill="#f0a830"/><circle cx="38" cy="57.5" r="5" fill="#222"/><circle cx="40.5" cy="54.5" r="1.8" fill="#fff"/>'
      : '<path d="M29 58 q9 -8 18 0" stroke="#222" stroke-width="3.4" fill="none" stroke-linecap="round"/>'; // 윙크(놀리기)
    const eyeR = '<circle cx="62" cy="57" r="9.5" fill="#f0a830"/><circle cx="62" cy="57.5" r="5" fill="#222"/><circle cx="64.5" cy="54.5" r="1.8" fill="#fff"/>';
    const mouth = happy
      ? '<path d="M43 75 q7 6 14 0" stroke="#7a6f63" stroke-width="2.2" fill="none" stroke-linecap="round"/>'
      : '<path d="M43 74 q7 6 14 0" stroke="#7a6f63" stroke-width="2.2" fill="none" stroke-linecap="round"/>'
        + '<path d="M50 76 q4 7 8 4 l-1 6 q-5 1 -7 -4 z" fill="#e98aa0"/>'; // 메롱 혀(놀리기)
    return '<ellipse cx="50" cy="55" rx="39" ry="37" fill="#a98a5e"/>'                     // 갈색 털 머리
      + '<path d="M39 26 C34 17 19 19 17 31 C19 40 29 43 33 38 C37 33 40 31 39 26 Z" fill="#8c6c40"/>' // 왼쪽 접힌 귀
      + '<path d="M61 26 C66 17 81 19 83 31 C81 40 71 43 67 38 C63 33 60 31 61 26 Z" fill="#8c6c40"/>' // 오른쪽 접힌 귀
      + '<path d="M32 31 C28 31 25 33 25 36 C28 38 31 37 33 35 Z" fill="#c2a0a6" opacity=".7"/>'        // 귀 안쪽
      + '<path d="M68 31 C72 31 75 33 75 36 C72 38 69 37 67 35 Z" fill="#c2a0a6" opacity=".7"/>'
      + '<g fill="none" stroke="#1c1712" stroke-width="3" stroke-linecap="round">'         // 진한 검은색 태비 줄무늬
      +   '<path d="M50 27 V45"/>'                                                          //  이마 중앙
      +   '<path d="M43 30 q-2.5 8 -3.5 15"/><path d="M57 30 q2.5 8 3.5 15"/>'              //  안쪽 한 쌍
      +   '<path d="M34 34 q-3 8 -3 15"/><path d="M66 34 q3 8 3 15"/>'                      //  바깥쪽 한 쌍
      +   '<path d="M25 49 q-2 6 -4 11"/><path d="M75 49 q2 6 4 11"/>'                      //  관자놀이/볼 옆
      +   '<path d="M28 60 q-2 4 -5 6"/><path d="M72 60 q2 4 5 6"/>'                        //  볼 아래
      + '</g>'
      + '<ellipse cx="50" cy="74" rx="25" ry="17" fill="#ffffff"/>'                         // 완전 흰색 입/주둥이/가슴
      + eyeL + eyeR
      + '<path d="M46 67 h8 l-4 5 z" fill="#d98a96"/>'                                      // 코
      + mouth
      + '<g stroke="#efe7d5" stroke-width="1.3" stroke-linecap="round" opacity=".9">'       // 수염
      + '<path d="M40 70 H15"/><path d="M40 73 H17"/><path d="M60 70 H85"/><path d="M60 73 H83"/></g>';
  }

  function catSVG(variant, mood) {
    let scene;
    if (variant === 1) {
      // 사진②: 흰 양말 발 모으고 베이지 의자에 앉은 모습
      scene = headMarkup(mood)
        + '<rect x="0" y="87" width="100" height="13" fill="#e7dcc4"/>'
        + '<ellipse cx="50" cy="87" rx="52" ry="6" fill="#efe6d2"/>'
        + '<g fill="#ffffff" stroke="#dcd6ca" stroke-width="0.8">'
        + '<rect x="37" y="79" width="11" height="14" rx="5.5"/>'
        + '<rect x="52" y="79" width="11" height="14" rx="5.5"/></g>'
        + '<g stroke="#d8d2c6" stroke-width="0.6"><path d="M42.5 92 V85"/><path d="M57.5 92 V85"/></g>';
    } else if (variant === 2) {
      // 사진③: 지구본 옆에 앉은 모습
      scene = '<g transform="translate(15,4) scale(.86)">' + headMarkup(mood) + '</g>'
        + '<circle cx="17" cy="74" r="13" fill="#4a90d9"/>'
        + '<path d="M9 68 q6 -3 10 2 q-3 5 -9 4 z" fill="#5bb56a"/>'
        + '<path d="M18 80 q5 -2 8 2 q-4 4 -9 1 z" fill="#5bb56a"/>'
        + '<circle cx="17" cy="74" r="13" fill="none" stroke="#2f6aa8" stroke-width="1"/>'
        + '<path d="M17 87 V94 M11 94 H23" stroke="#333" stroke-width="2" stroke-linecap="round"/>';
    } else {
      // 사진①: 초록 박스에 쏙 들어간 모습
      scene = headMarkup(mood)
        + '<path d="M16 82 L50 89 L84 82 L84 84 L50 91 L16 84 Z" fill="#2f6f24"/>'
        + '<rect x="18" y="83" width="64" height="16" rx="2.5" fill="#3a8a2c"/>'
        + '<rect x="18" y="83" width="64" height="5" fill="#327a26"/>'
        + '<rect x="30" y="90" width="40" height="7" rx="1.5" fill="#27611d" opacity=".45"/>';
    }
    return '<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">' + scene + '</svg>';
  }

  const CHEER_MSGS = [
    '냥! 또 깼다! 이러다 벽돌 멸종하겠다냥 😼',
    '오 좀 치는데? 베네스가 인정한다냥',
    '그렇지! 그거다냥! 벽돌이 울고 있다냥 😹',
    '낮잠 자다 깼는데… 깰 만했다냥 💤',
    '골골골… 베네스가 다 뿌듯하다냥',
    '집사 오늘 좀 멋있다냥. 사진 한 장만 찍자냥 📸',
    '이 속도면 벽돌 가게 문 닫겠다냥 🧱',
    '와… 방금 거 베네스가 박제할 뻔했다냥',
    '재능 발견! 집사 직업 바꿔야 하는 거 아니냥?'
  ];
  const TAUNT_MSGS = [
    '푸하하 그걸 놓치냥? 발이 미끄러졌냥? 😹',
    '공이 도망갔다냥! 안 잡으러 가냥?',
    '괜찮다냥… 원래 집사는 똥손이라냥 🐾',
    '방금 거 못 본 걸로 해줄게냥. 베네스는 못 봤다냥 🙈',
    '이걸 놓치냥? 오늘 츄르는 압수다냥 😼',
    '에잇~ 그래도 귀여우니까 베네스가 봐준다냥',
    '공: "잘 있어라 집사야~" 😻',
    '집중! 집중! …이라고 말해주는 건 베네스뿐이냥'
  ];

  const cheerEl = document.getElementById('cheer');
  const cheerFace = document.getElementById('cheerFace');
  const cheerMsg = document.getElementById('cheerMsg');
  let bricksBroken = 0, cheerTimer = null, soundOn = true, catVariant = 0;
  const pick = arr => arr[Math.floor(Math.random() * arr.length)];

  // 음성: Web Speech API로 고양이가 말하기 (한국어, 높은 톤)
  const synth = window.speechSynthesis;
  if (synth) synth.onvoiceschanged = () => {}; // 보이스 목록 워밍업
  function speak(text) {
    if (!soundOn || !synth) return;
    const clean = text.replace(/[^가-힣a-zA-Z0-9 ?!~.…]/g, '').trim(); // 이모지 제거
    if (!clean) return;
    const u = new SpeechSynthesisUtterance(clean);
    u.lang = 'ko-KR';
    u.rate = 1.05;
    u.pitch = 1.4; // 귀여운 톤
    const ko = synth.getVoices().find(v => v.lang && v.lang.toLowerCase().startsWith('ko'));
    if (ko) u.voice = ko;
    try { synth.cancel(); synth.speak(u); } catch (e) {}
  }

  function showToast(mood, msg) {
    cheerFace.innerHTML = catSVG(catVariant++ % 3, mood);
    cheerMsg.textContent = msg;
    cheerEl.classList.add('show');
    speak(msg);
    clearTimeout(cheerTimer);
    cheerTimer = setTimeout(() => cheerEl.classList.remove('show'), 2000);
  }
  function showCheer() { showToast('happy', pick(CHEER_MSGS)); }
  function showTaunt() { showToast('smug', pick(TAUNT_MSGS)); }

  document.querySelectorAll('#soundChips .chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('#soundChips .chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      soundOn = chip.dataset.sound === 'on';
      if (synth) synth.getVoices(); // 사용자 제스처에서 보이스 로드 유도
    });
  });

  let state = 'ready'; // ready | playing | over | win
  let score = 0, level = 1, lives = 3;
  let startLevel = 5, difficulty = 'hard';
  let paddle, ball, bricks;

  function makePaddle() {
    const w = difficulty === 'hard' ? 66 : difficulty === 'easy' ? 92 : 78;
    return { w, h: 14, x: W / 2 - w / 2, y: H - 34, speed: 7 };
  }
  function makeBall() {
    const speed = DIFF[difficulty] + level * 0.3;
    return { x: W / 2, y: H - 50, r: 7, dx: 0, dy: -speed, speed, stuck: true };
  }
  function makeBricks() {
    const rows = Math.min(3 + level, 9);
    const cols = 7;
    const pad = 6, offTop = 44, offLeft = 12;
    const bw = (W - offLeft * 2 - pad * (cols - 1)) / cols;
    const bh = 18;
    const arr = [];
    for (let r = 0; r < rows; r++)
      for (let c = 0; c < cols; c++)
        arr.push({
          x: offLeft + c * (bw + pad), y: offTop + r * (bh + pad),
          w: bw, h: bh, alive: true,
          color: COLORS[r % COLORS.length], points: (rows - r) * 10
        });
    return arr;
  }

  function startGame() {
    score = 0;
    level = startLevel;
    lives = 3;
    paddle = makePaddle();
    ball = makeBall();
    bricks = makeBricks();
    updateHud();
    state = 'playing';
  }
  function nextLevel() {
    level++;
    paddle = makePaddle();
    ball = makeBall();
    bricks = makeBricks();
    updateHud();
    state = 'playing';
  }
  function loseLife() {
    lives--;
    updateHud();
    if (lives <= 0) {
      state = 'over';
      cheerEl.classList.remove('show');
      const last = pick(TAUNT_MSGS);
      speak(last);
      showOverlay('💥 게임 오버', `${last}<br>최종 점수 <span class="big">${score}</span>`, '다시 하기', true);
    } else {
      showTaunt(); // 공 놓치면 놀리는 메시지
      paddle = makePaddle();
      ball = makeBall();
    }
  }

  function updateHud() {
    scoreEl.textContent = score;
    levelEl.textContent = level;
    livesEl.textContent = lives > 0 ? '♥'.repeat(lives) : '–';
  }

  // ----- 시작 화면 컨트롤 -----
  const lvVal = document.getElementById('lvVal');
  const controls = document.getElementById('ov-controls');
  document.getElementById('lvDown').addEventListener('click', () => {
    startLevel = Math.max(1, startLevel - 1); lvVal.textContent = startLevel;
  });
  document.getElementById('lvUp').addEventListener('click', () => {
    startLevel = Math.min(10, startLevel + 1); lvVal.textContent = startLevel;
  });
  document.querySelectorAll('#diffChips .chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('#diffChips .chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      difficulty = chip.dataset.diff;
    });
  });

  function showOverlay(title, sub, btn, showControls) {
    document.getElementById('ov-title').innerHTML = title;
    document.getElementById('ov-sub').innerHTML = sub;
    startBtn.textContent = btn;
    controls.style.display = showControls ? 'flex' : 'none';
    document.getElementById('ov-hint').style.display = showControls ? 'block' : 'none';
    overlay.classList.remove('hidden');
  }

  startBtn.addEventListener('click', () => {
    overlay.classList.add('hidden');
    if (state === 'win') nextLevel();
    else startGame(); // ready 또는 over
  });

  // ----- 입력 -----
  let keyLeft = false, keyRight = false;
  function movePaddleTo(clientX) {
    const rect = canvas.getBoundingClientRect();
    const rel = (clientX - rect.left) / rect.width * W;
    paddle.x = Math.max(0, Math.min(W - paddle.w, rel - paddle.w / 2));
  }
  canvas.addEventListener('mousemove', e => { if (state === 'playing') movePaddleTo(e.clientX); });
  canvas.addEventListener('mousedown', () => { if (ball) ball.stuck = false; });
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    if (ball) ball.stuck = false;
    if (state === 'playing' && e.touches[0]) movePaddleTo(e.touches[0].clientX);
  }, { passive: false });
  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (state === 'playing' && e.touches[0]) movePaddleTo(e.touches[0].clientX);
  }, { passive: false });
  window.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft') keyLeft = true;
    if (e.key === 'ArrowRight') keyRight = true;
    if (e.key === ' ' && ball) ball.stuck = false;
  });
  window.addEventListener('keyup', e => {
    if (e.key === 'ArrowLeft') keyLeft = false;
    if (e.key === 'ArrowRight') keyRight = false;
  });

  // ----- 업데이트 -----
  function update() {
    if (state !== 'playing') return;

    if (keyLeft) paddle.x -= paddle.speed;
    if (keyRight) paddle.x += paddle.speed;
    paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x));

    if (ball.stuck) {
      ball.x = paddle.x + paddle.w / 2;
      ball.y = paddle.y - ball.r - 1;
      return;
    }

    ball.x += ball.dx;
    ball.y += ball.dy;

    if (ball.x - ball.r < 0) { ball.x = ball.r; ball.dx *= -1; }
    if (ball.x + ball.r > W) { ball.x = W - ball.r; ball.dx *= -1; }
    if (ball.y - ball.r < 0) { ball.y = ball.r; ball.dy *= -1; }

    if (ball.y - ball.r > H) { loseLife(); return; }

    // 패들 충돌
    if (ball.dy > 0 &&
        ball.y + ball.r >= paddle.y &&
        ball.y + ball.r <= paddle.y + paddle.h + 10 &&
        ball.x >= paddle.x && ball.x <= paddle.x + paddle.w) {
      const hit = (ball.x - (paddle.x + paddle.w / 2)) / (paddle.w / 2);
      const angle = Math.max(-1, Math.min(1, hit)) * (Math.PI / 3);
      const speed = Math.hypot(ball.dx, ball.dy) || ball.speed;
      ball.dx = Math.sin(angle) * speed;
      ball.dy = -Math.abs(Math.cos(angle) * speed);
      ball.y = paddle.y - ball.r - 1;
    }

    // 벽돌 충돌
    for (const b of bricks) {
      if (!b.alive) continue;
      if (ball.x + ball.r > b.x && ball.x - ball.r < b.x + b.w &&
          ball.y + ball.r > b.y && ball.y - ball.r < b.y + b.h) {
        b.alive = false;
        score += b.points;
        bricksBroken++;
        if (bricksBroken % 3 === 0) showCheer();
        updateHud();
        const overlapX = Math.min(ball.x + ball.r - b.x, b.x + b.w - (ball.x - ball.r));
        const overlapY = Math.min(ball.y + ball.r - b.y, b.y + b.h - (ball.y - ball.r));
        if (overlapX < overlapY) ball.dx *= -1; else ball.dy *= -1;
        break;
      }
    }

    if (bricks.every(b => !b.alive)) {
      state = 'win';
      showOverlay('🎉 레벨 클리어!', `점수 <span class="big">${score}</span>`, '다음 레벨 →', false);
    }
  }

  // ----- 렌더 -----
  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }
  function draw() {
    ctx.clearRect(0, 0, W, H);
    if (bricks) for (const b of bricks) {
      if (!b.alive) continue;
      ctx.fillStyle = b.color; roundRect(b.x, b.y, b.w, b.h, 4); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,.18)'; roundRect(b.x, b.y, b.w, b.h / 2.5, 4); ctx.fill();
    }
    if (paddle) { ctx.fillStyle = '#e8e8ff'; roundRect(paddle.x, paddle.y, paddle.w, paddle.h, 7); ctx.fill(); }
    if (ball) { ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2); ctx.fillStyle = '#6df2c4'; ctx.fill(); }
    if (ball && ball.stuck && state === 'playing') {
      ctx.fillStyle = 'rgba(232,232,255,.75)';
      ctx.font = '13px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('화면을 터치/클릭해서 발사!', W / 2, H / 2);
    }
  }

  function loop() { update(); draw(); requestAnimationFrame(loop); }
  loop();
})();
</script>
</body>
</html>
